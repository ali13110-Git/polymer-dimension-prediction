<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polymer Dimension Predictor</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen p-4 md:p-10 font-sans">
    <div class="max-w-3xl mx-auto space-y-8">
        
        <header class="text-center space-y-2">
            <h1 class="text-4xl font-extrabold tracking-tight text-white">Polymer Predictor</h1>
            <p class="text-slate-400">Global Molding Calibration & Prediction System</p>
        </header>

        <section class="bg-slate-800 p-6 rounded-2xl border border-blue-500/20 shadow-xl">
            <div class="flex items-center gap-3 mb-6">
                <div class="bg-blue-600 p-2 rounded-lg">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z"></path></svg>
                </div>
                <h2 class="text-xl font-semibold text-blue-400">1. Calibration (One-time Setup)</h2>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                <div>
                    <label class="block text-xs font-medium text-slate-400 uppercase mb-1">Initial Measurement</label>
                    <input type="file" id="initFile" class="block w-full text-sm text-slate-300 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-600 file:text-white hover:file:bg-blue-700">
                </div>
                <div>
                    <label class="block text-xs font-medium text-slate-400 uppercase mb-1">Final Measurement</label>
                    <input type="file" id="finalFile" class="block w-full text-sm text-slate-300 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-600 file:text-white hover:file:bg-blue-700">
                </div>
            </div>
            <button onclick="handleTrain()" class="w-full bg-blue-600 hover:bg-blue-500 transition-colors py-3 rounded-xl font-bold shadow-lg shadow-blue-900/20">Run Calibration</button>
        </section>

        <section class="bg-slate-800 p-6 rounded-2xl border border-emerald-500/20 shadow-xl">
            <div class="flex items-center gap-3 mb-6">
                <div class="bg-emerald-600 p-2 rounded-lg">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
                </div>
                <h2 class="text-xl font-semibold text-emerald-400">2. Prediction (Daily Startup)</h2>
            </div>
            
            <div class="mb-6">
                <label class="block text-xs font-medium text-slate-400 uppercase mb-1">Startup Measurement File</label>
                <input type="file" id="startupFile" class="block w-full text-sm text-slate-300 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-emerald-600 file:text-white hover:file:bg-emerald-700">
            </div>
            <button onclick="handlePredict()" class="w-full bg-emerald-600 hover:bg-emerald-500 transition-colors py-3 rounded-xl font-bold shadow-lg shadow-emerald-900/20">Predict Final Dimensions</button>
        </section>

        <div id="status" class="hidden p-4 rounded-xl border font-medium text-center transition-all duration-300"></div>

        <div id="resultsWrapper" class="hidden animate-in fade-in slide-in-from-bottom-4 duration-500">
            <div class="bg-slate-800 rounded-2xl border border-slate-700 overflow-hidden shadow-2xl">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-700/50">
                            <th class="p-4 text-xs font-bold uppercase text-slate-400">Dimension</th>
                            <th class="p-4 text-xs font-bold uppercase text-slate-400">Current Avg</th>
                            <th class="p-4 text-xs font-bold uppercase text-emerald-400">Predicted Final</th>
                        </tr>
                    </thead>
                    <tbody id="resultsBody" class="divide-y divide-slate-700">
                        </tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        function showStatus(msg, type = 'info') {
            const s = document.getElementById('status');
            s.innerText = msg;
            s.classList.remove('hidden', 'bg-blue-900/40', 'border-blue-500/50', 'text-blue-200', 'bg-red-900/40', 'border-red-500/50', 'text-red-200', 'bg-emerald-900/40', 'border-emerald-500/50', 'text-emerald-200');
            
            if (type === 'error') {
                s.classList.add('bg-red-900/40', 'border-red-500/50', 'text-red-200');
            } else if (type === 'success') {
                s.classList.add('bg-emerald-900/40', 'border-emerald-500/50', 'text-emerald-200');
            } else {
                s.classList.add('bg-blue-900/40', 'border-blue-500/50', 'text-blue-200');
            }
        }

        async function handleTrain() {
            const initFile = document.getElementById('initFile').files[0];
            const finalFile = document.getElementById('finalFile').files[0];
            if (!initFile || !finalFile) return showStatus("Select both files first!", "error");

            const fd = new FormData();
            fd.append('initial_file', initFile);
            fd.append('final_file', finalFile);

            showStatus("Calibrating on Raspberry Pi...");
            try {
                const res = await fetch('/check-dimension/train', { method: 'POST', body: fd });
                const data = await res.json();
                if (data.status === 'ok') showStatus("Bingo! Calibration successful.", "success");
                else showStatus("Error: " + data.detail, "error");
            } catch (e) { showStatus("Network Error: Could not reach Pi Tunnel.", "error"); }
        }

        async function handlePredict() {
            const startupFile = document.getElementById('startupFile').files[0];
            if (!startupFile) return showStatus("Select startup file first!", "error");

            const fd = new FormData();
            fd.append('startup_file', startupFile);

            showStatus("Calculating predictions...");
            try {
                const res = await fetch('/check-dimension/predict', { method: 'POST', body: fd });
                const data = await res.json();
                
                if (data.status === 'ok' && data.predictions) {
                    showStatus("Predictions updated.", "success");
                    const body = document.getElementById('resultsBody');
                    body.innerHTML = '';
                    data.predictions.forEach(p => {
                        body.innerHTML += `
                            <tr class="hover:bg-slate-700/30 transition-colors">
                                <td class="p-4 font-semibold text-white">${p.dimension}</td>
                                <td class="p-4 text-slate-400">${p.current} mm</td>
                                <td class="p-4 text-emerald-400 font-bold">${p.predicted} mm</td>
                            </tr>
                        `;
                    });
                    document.getElementById('resultsWrapper').classList.remove('hidden');
                } else {
                    showStatus("Error: " + (data.detail || "Model not calibrated"), "error");
                }
            } catch (e) { showStatus("Network Error.", "error"); }
        }
    </script>
</body>
</html>
